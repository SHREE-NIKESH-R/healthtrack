<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A6DB5"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#FFFFFF"/>

  <!-- EKG pulse line -->
  <polyline
    points="2,16 7,16 9,10 11,22 13,8 15,20 17,14 19,16 24,16 26,11 28,16 30,16"
    fill="none"
    stroke="url(#line)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Blinking dot at end -->
  <circle cx="30" cy="16" r="1.5" fill="#7B68EE"/>
</svg>
